<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TLD Search</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        --active-keycap: oklch(0.72 0.11 255);
      }

      body {
        margin: 0;
        padding: 2rem;
        background: Canvas;
        color: CanvasText;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
      }

      h1 {
        margin-bottom: 0.25rem;
      }

      .meta {
        color: color-mix(in srgb, CanvasText 65%, transparent);
        margin-bottom: 1.5rem;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
      }

      .search-shell {
        position: relative;
        display: flex;
        align-items: center;
      }

      #tld-search {
        width: 100%;
        box-sizing: border-box;
        padding: 0.9rem 11.5rem 0.9rem 1rem;
        border: 1px solid color-mix(in srgb, CanvasText 25%, transparent);
        border-radius: 0.75rem;
        font-size: 1rem;
        background: Canvas;
        color: CanvasText;
      }

      .shortcut-hint {
        position: absolute;
        right: 0.65rem;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        pointer-events: none;
        user-select: none;
        color: color-mix(in srgb, CanvasText 55%, transparent);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .keycap {
        min-width: 1.45rem;
        padding: 0.15rem 0.4rem;
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 0.4rem;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: color-mix(in srgb, CanvasText 7%, transparent);
        color: CanvasText;
        box-shadow: 0 1px 0 color-mix(in srgb, CanvasText 14%, transparent);
        transition:
          background-color 120ms ease,
          border-color 120ms ease,
          color 120ms ease;
      }

      .keycap.is-pressed {
        background: var(--active-keycap);
        border-color: var(--active-keycap);
        color: white;
      }

      .stats {
        margin: 1rem 0;
        color: color-mix(in srgb, CanvasText 70%, transparent);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 140px), 1fr));
        gap: 0.5rem;
      }

      .tld {
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;

        padding: 0.65rem 0.75rem;
        border: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
        border-radius: 0.65rem;

        text-align: center;

        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        line-height: 1.35;

        background: color-mix(in srgb, CanvasText 5%, transparent);
      }

      .tld-unicode {
        display: block;
        margin-top: 0.25rem;
        font-size: 0.85rem;
        opacity: 0.72;
      }

      footer {
        margin-top: 2rem;
        font-size: 0.9rem;
        color: color-mix(in srgb, CanvasText 60%, transparent);
      }

      a {
        color: inherit;
      }

      @media (max-width: 520px) {
        #tld-search {
          padding-right: 1rem;
          padding-bottom: 2.45rem;
        }

        .shortcut-hint {
          left: 1rem;
          right: auto;
          bottom: 0.7rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TLD Search</h1>
      <p class="meta" id="meta">Loading TLD list…</p>

      <div class="search-shell">
        <label class="sr-only" for="tld-search">Search TLDs</label>
        <input id="tld-search" data-primary-search type="search" placeholder="Search .com, .ca, .dev…" autocomplete="off" />
        <div class="shortcut-hint" aria-hidden="true">
          <span>Focus:</span>
          <kbd class="keycap" data-keycap="slash">/</kbd>
          <span>or</span>
          <kbd class="keycap" data-keycap="modifier">⌘</kbd>
          <kbd class="keycap" data-keycap="k">K</kbd>
        </div>
      </div>

      <p class="stats" id="stats"></p>

      <section class="grid" id="results" aria-live="polite"></section>

      <footer>
        <p>
          Data:
          <a href="./tlds.txt">TXT</a> · <a href="./tlds.json">JSON</a> · <a href="./tlds.min.json">MIN JSON</a> ·
          <a href="./tlds.sha256">SHA256</a>
        </p>
      </footer>
    </main>

    <script>
      const searchInput = document.querySelector("[data-primary-search]");
      const results = document.querySelector("#results");
      const stats = document.querySelector("#stats");
      const meta = document.querySelector("#meta");
      const modifierKeycap = document.querySelector("[data-keycap='modifier']");
      const slashKeycap = document.querySelector("[data-keycap='slash']");
      const kKeycap = document.querySelector("[data-keycap='k']");

      let allTlds = [];

      function isApplePlatform() {
        return /Mac|iPhone|iPad|iPod/i.test(navigator.platform) || (navigator.userAgent.includes("Mac") && "ontouchend" in document);
      }

      const platformModifier = isApplePlatform() ? "metaKey" : "ctrlKey";
      modifierKeycap.textContent = isApplePlatform() ? "⌘" : "Ctrl";

      function normalizeQuery(value) {
        return value.trim().toLowerCase().replace(/^\./, "");
      }

      function isEditableTarget(target) {
        if (!(target instanceof HTMLElement)) {
          return false;
        }

        return Boolean(target.closest("input, textarea, select, [contenteditable=''], [contenteditable='true']"));
      }

      function setKeycapPressed(keycap, isPressed) {
        keycap.classList.toggle("is-pressed", isPressed);
      }

      function clearPressedKeycaps() {
        setKeycapPressed(slashKeycap, false);
        setKeycapPressed(modifierKeycap, false);
        setKeycapPressed(kKeycap, false);
      }

      function focusSearch(event, options = {}) {
        event.preventDefault();

        if (document.activeElement !== searchInput) {
          searchInput.focus({ preventScroll: true });
          searchInput.select();
        }

        window.setTimeout(() => {
          clearPressedKeycaps();
        }, options.clearDelay ?? 120);
      }

      function onShortcutKeyDown(event) {
        const key = event.key.toLowerCase();

        if (event.key === "/") {
          setKeycapPressed(slashKeycap, true);
        }

        if (event.metaKey || event.ctrlKey) {
          setKeycapPressed(modifierKeycap, true);
        }

        if (key === "k") {
          setKeycapPressed(kKeycap, true);
        }
      }

      function onShortcutKeyUp(event) {
        const key = event.key.toLowerCase();

        if (event.key === "/") {
          setKeycapPressed(slashKeycap, false);
        }

        if (event.key === "Meta" || event.key === "Control") {
          setKeycapPressed(modifierKeycap, false);
          setKeycapPressed(kKeycap, false);
        }

        if (key === "k") {
          setKeycapPressed(kKeycap, false);
        }
      }

      function createSearchShortcutHandler(input) {
        function onKeyDown(event) {
          const key = event.key.toLowerCase();

          if (document.activeElement === input && key === "escape") {
            input.blur();
            clearPressedKeycaps();
            return;
          }

          if (!isEditableTarget(event.target)) {
            onShortcutKeyDown(event);
          }

          if (isEditableTarget(event.target)) {
            return;
          }

          if (event.key === "/") {
            focusSearch(event);
            return;
          }

          if (key === "k" && event[platformModifier]) {
            setKeycapPressed(modifierKeycap, true);
            setKeycapPressed(kKeycap, true);

            event.preventDefault();

            requestAnimationFrame(() => {
              focusSearch(event);
            });
          }
        }

        function onKeyUp(event) {
          onShortcutKeyUp(event);
        }

        function onBlur() {
          clearPressedKeycaps();
        }

        window.addEventListener("keydown", onKeyDown);
        window.addEventListener("keyup", onKeyUp);
        window.addEventListener("blur", onBlur);

        return function cleanup() {
          window.removeEventListener("keydown", onKeyDown);
          window.removeEventListener("keyup", onKeyUp);
          window.removeEventListener("blur", onBlur);
        };
      }

      async function loadTldData() {
        const paths = ["./tlds.min.json", "./tlds.json"];

        for (const path of paths) {
          try {
            const response = await fetch(path);

            if (response.ok) {
              return await response.json();
            }
          } catch {
            // Try the next path.
          }
        }

        throw new Error("Failed to load tlds.min.json or tlds.json");
      }

      function decodePunycode(input) {
        const base = 36;
        const tMin = 1;
        const tMax = 26;
        const skew = 38;
        const damp = 700;
        const initialBias = 72;
        const initialN = 128;
        const delimiter = "-";

        function adapt(delta, numPoints, firstTime) {
          delta = firstTime ? Math.floor(delta / damp) : delta >> 1;
          delta += Math.floor(delta / numPoints);

          let k = 0;

          while (delta > ((base - tMin) * tMax) >> 1) {
            delta = Math.floor(delta / (base - tMin));
            k += base;
          }

          return k + Math.floor(((base - tMin + 1) * delta) / (delta + skew));
        }

        function decodeDigit(codePoint) {
          if (codePoint >= 48 && codePoint <= 57) {
            return 26 + codePoint - 48;
          }

          if (codePoint >= 65 && codePoint <= 90) {
            return codePoint - 65;
          }

          if (codePoint >= 97 && codePoint <= 122) {
            return codePoint - 97;
          }

          return base;
        }

        const output = [];
        let n = initialN;
        let i = 0;
        let bias = initialBias;

        const basic = input.lastIndexOf(delimiter);

        if (basic > -1) {
          for (let j = 0; j < basic; j += 1) {
            output.push(input.charCodeAt(j));
          }
        }

        let index = basic > -1 ? basic + 1 : 0;

        while (index < input.length) {
          const oldI = i;
          let w = 1;

          for (let k = base; ; k += base) {
            if (index >= input.length) {
              throw new Error("Invalid punycode input");
            }

            const digit = decodeDigit(input.charCodeAt(index));
            index += 1;
            i += digit * w;

            const t = k <= bias ? tMin : k >= bias + tMax ? tMax : k - bias;

            if (digit < t) {
              break;
            }

            w *= base - t;
          }

          const outLength = output.length + 1;

          bias = adapt(i - oldI, outLength, oldI === 0);
          n += Math.floor(i / outLength);
          i %= outLength;

          output.splice(i, 0, n);
          i += 1;
        }

        return String.fromCodePoint(...output);
      }

      function decodeIdnTld(tld) {
        if (!tld.startsWith("xn--")) {
          return null;
        }

        try {
          const unicode = decodePunycode(tld.slice(4));

          if (!unicode || unicode === tld) {
            return null;
          }

          return unicode;
        } catch {
          return null;
        }
      }

      function render() {
        const query = normalizeQuery(searchInput.value);

        const matches = query ? allTlds.filter((tld) => tld.includes(query)) : allTlds;

        stats.textContent = `${matches.length.toLocaleString()} of ${allTlds.length.toLocaleString()} TLDs`;

        results.innerHTML = "";

        for (const tld of matches) {
          const item = document.createElement("div");
          item.className = "tld";

          const ascii = document.createElement("span");
          ascii.textContent = `.${tld}`;
          item.appendChild(ascii);

          const unicode = decodeIdnTld(tld);

          if (unicode) {
            const rendered = document.createElement("span");
            rendered.className = "tld-unicode";
            rendered.textContent = `.${unicode}`;
            item.appendChild(rendered);
          }

          results.appendChild(item);
        }
      }

      async function init() {
        const data = await loadTldData();

        allTlds = data.tlds;

        meta.textContent = `Updated ${new Date(data.updated_at).toLocaleString()} · ${data.count.toLocaleString()} TLDs`;

        render();
      }

      const cleanupSearchShortcut = createSearchShortcutHandler(searchInput);

      window.addEventListener("pagehide", cleanupSearchShortcut, { once: true });

      searchInput.addEventListener("focus", () => {
        window.setTimeout(() => {
          clearPressedKeycaps();
        }, 140);
      });

      searchInput.addEventListener("input", render);

      init().catch((error) => {
        meta.textContent = error.message;
      });
    </script>
  </body>
</html>
